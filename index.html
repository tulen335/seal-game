<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тюлень: Универсальное управление</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        .ui {
            position: absolute; top: 15px; left: 15px;
            color: white; font-size: 18px; font-weight: bold;
            text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10;
        }
        .best-score { color: #ffcc00; font-size: 22px; }

        /* Кнопка переключения */
        .toggle-btn {
            position: absolute; top: 15px; right: 15px;
            padding: 10px 15px; background: rgba(0, 0, 0, 0.5);
            color: white; border: 2px solid #4facfe; border-radius: 8px;
            cursor: pointer; z-index: 30; font-weight: bold;
        }

        /* Джойстик */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3);
            display: none; z-index: 15; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px;
            background: rgba(79, 172, 254, 0.6);
            border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #gameOver {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center;
            background: rgba(0, 20, 40, 0.95); padding: 30px;
            border: 3px solid #4facfe; border-radius: 20px; display: none; z-index: 40;
        }
        .main-btn {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #4facfe; color: white; border: none; border-radius: 10px;
        }
        .damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.2); display: none; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="flash" class="damage-flash"></div>
    <div class="ui">
        <div class="best-score">Рекорд: <span id="best">0</span></div>
        <div>Рыбок: <span id="score">0</span></div>
        <div>Время: <span id="timer">60</span></div>
    </div>

    <button class="toggle-btn" onclick="toggleControl()">Управление: Кнопки</button>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="gameOver">
        <h1 id="msg">Время вышло!</h1>
        <button class="main-btn" onclick="resetGame()">Играть снова</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const timerDisplay = document.getElementById('timer');
        const joystick = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        const toggleBtn = document.querySelector('.toggle-btn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let bestScore = localStorage.getItem('sealBest') || 0;
        let timeLeft = 60;
        let gameActive = true;
        let controlType = 'keyboard'; 
        let bubbles = [];

        bestDisplay.innerText = bestScore;

        const sealImg = new Image(); sealImg.src = 'seal.jfif';
        const fishImg = new Image(); fishImg.src = 'fish.jpg';

        const seal = { x: 100, y: 300, w: 90, h: 70, vx: 0, vy: 0, speed: 0.8, friction: 0.93, facingLeft: false };
        const fish = { x: -100, y: 0, w: 60, h: 40, speed: 4, gold: false };
        const rock = { x: -200, y: 0, w: 110, h: 90, speed: 3.5 };

        // ЭФФЕКТЫ: ПУЗЫРЬКИ
        function initBubbles() {
            bubbles = [];
            for(let i=0; i<30; i++) bubbles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, v: Math.random()*0.5+0.2 });
        }

        // ПЕРЕКЛЮЧАТЕЛЬ УПРАВЛЕНИЯ
        function toggleControl() {
            if (controlType === 'keyboard') {
                controlType = 'joystick';
                toggleBtn.innerText = "Управление: Джойстик";
                joystick.style.display = 'block';
            } else {
                controlType = 'keyboard';
                toggleBtn.innerText = "Управление: Кнопки";
                joystick.style.display = 'none';
                touchX = 0; touchY = 0;
            }
        }

        // КЛАВИАТУРА
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // УНИВЕРСАЛЬНЫЙ ДЖОЙСТИК (МЫШЬ + ТАЧ)
        let touchX = 0, touchY = 0, isDragging = false;
        
        const startDrag = (e) => { if (controlType === 'joystick') isDragging = true; };
        const endDrag = () => { 
            isDragging = false; touchX = 0; touchY = 0; 
            knob.style.transform = `translate(0, 0)`; 
        };
        const moveDrag = (e) => {
            if (!isDragging || controlType !== 'joystick') return;
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 45;

            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }

            knob.style.transform = `translate(${dx}px, ${dy}px)`;
            touchX = dx / maxDist;
            touchY = dy / maxDist;
        };

        // Слушатели для мышки на джойстике
        joystick.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);

        // Слушатели для тача
        joystick.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', moveDrag);
        window.addEventListener('touchend', endDrag);

        // Таймер
        setInterval(() => { if(gameActive) { timeLeft--; timerDisplay.innerText = timeLeft; if(timeLeft <= 0) endGame(); } }, 1000);

        function spawnFish() { fish.x = canvas.width + 100; fish.y = 50 + Math.random()*(canvas.height-100); fish.gold = Math.random() < 0.2; }
        function spawnRock() { rock.x = canvas.width + 500; rock.y = Math.random()*(canvas.height-100); }

        function endGame() {
            gameActive = false;
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('sealBest', bestScore);
                bestDisplay.innerText = bestScore;
            }
            document.getElementById('gameOver').style.display = 'block';
        }

        function resetGame() {
            score = 0; timeLeft = 60; gameActive = true;
            scoreDisplay.innerText = 0; timerDisplay.innerText = 60;
            document.getElementById('gameOver').style.display = 'none';
            spawnFish(); spawnRock(); draw();
        }

        function update() {
            if(!gameActive) return;

            if (controlType === 'keyboard') {
                if(keys['ArrowUp']) seal.vy -= seal.speed;
                if(keys['ArrowDown']) seal.vy += seal.speed;
                if(keys['ArrowLeft']) { seal.vx -= seal.speed; seal.facingLeft = true; }
                if(keys['ArrowRight']) { seal.vx += seal.speed; seal.facingLeft = false; }
            } else {
                seal.vx += touchX * (seal.speed * 1.5);
                seal.vy += touchY * (seal.speed * 1.5);
                if (touchX < -0.1) seal.facingLeft = true;
                if (touchX > 0.1) seal.facingLeft = false;
            }

            seal.vx *= seal.friction; seal.vy *= seal.friction;
            seal.x += seal.vx; seal.y += seal.vy;

            if(seal.x < 0) seal.x = 0;
            if(seal.x > canvas.width - seal.w) seal.x = canvas.width - seal.w;
            if(seal.y < 0) seal.y = 0;
            if(seal.y > canvas.height - seal.h) seal.y = canvas.height - seal.h;

            fish.x -= fish.speed; if(fish.x < -100) spawnFish();
            rock.x -= rock.speed; if(rock.x < -150) spawnRock();

            if(Math.abs(seal.x - fish.x) < 50 && Math.abs(seal.y - fish.y) < 40) {
                if(fish.gold) timeLeft += 10; else { score++; scoreDisplay.innerText = score; }
                spawnFish();
            }

            if(Math.abs(seal.x - rock.x) < 60 && Math.abs(seal.y - rock.y) < 50) {
                timeLeft -= 5;
                document.getElementById('flash').style.display = 'block';
                setTimeout(() => document.getElementById('flash').style.display = 'none', 100);
                spawnRock();
            }
        }

        function draw() {
            if(!gameActive) return;

            // ГРАДИЕНТ МОРЯ
            let g = ctx.createLinearGradient(0,0,0,canvas.height);
            g.addColorStop(0, '#1cb5e0'); g.addColorStop(1, '#000046');
            ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height);

            // ПУЗЫРЬКИ
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            bubbles.forEach(b => { 
                ctx.beginPath(); ctx.arc(b.x, b.y, b.s, 0, 7); ctx.fill(); 
                b.y -= b.v; if(b.y < -10) b.y = canvas.height+10; 
            });

            // ЛЬДИНА
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.beginPath(); ctx.moveTo(rock.x, rock.y+20); ctx.lineTo(rock.x+rock.w, rock.y); ctx.lineTo(rock.x+rock.w-10, rock.y+rock.h); ctx.lineTo(rock.x+10, rock.y+rock.h-10); ctx.fill();

            // ТЮЛЕНЬ
            ctx.save();
            ctx.translate(seal.x + seal.w/2, seal.y + seal.h/2);
            if(seal.facingLeft) ctx.scale(-1, 1);
            ctx.drawImage(sealImg, -seal.w/2, -seal.h/2, seal.w, seal.h);
            ctx.restore();

            // РЫБКА
            ctx.save();
            if(fish.gold) ctx.filter = "sepia(1) saturate(10) brightness(1.2)";
            ctx.drawImage(fishImg, fish.x, fish.y, fish.w, fish.h);
            ctx.restore();

            update();
            requestAnimationFrame(draw);
        }

        initBubbles(); spawnFish(); spawnRock();
        sealImg.onload = fishImg.onload = () => draw();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initBubbles(); });
    </script>
</body>
</html>
