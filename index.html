<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seal Game Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: white; font-size: 20px; pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">Рыбки: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    // Настройка размеров под любой экран
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Загрузка ресурсов (Проверь, чтобы названия файлов на GitHub были такими же!)
    const sealImg = new Image(); sealImg.src = 'seal.jfif';
    const fishImg = new Image(); fishImg.src = 'fish.jpg';

    // Параметры джойстика
    const joystick = {
        active: false,
        startX: 0, startY: 0,
        currX: 0, currY: 0,
        maxRadius: 60
    };

    // Параметры игрока
    const seal = {
        x: 50, y: 100, w: 70, h: 70,
        vx: 0, vy: 0,
        speed: 6,
        gravity: 0.4,
        jumpPower: -10,
        isJumping: false,
        facingLeft: false
    };

    // Объекты
    let score = 0;
    const fish = { x: 300, y: 200, w: 40, h: 30 };
    const rock = { x: 100, y: 0, w: 160, h: 40 }; 
    rock.y = canvas.height * 0.7; // Льдина в нижней части

    // ОБРАБОТКА КАСАНИЙ
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        
        // Если нажали в левой половине — включаем джойстик
        if (touch.clientX < canvas.width / 2) {
            joystick.active = true;
            joystick.startX = touch.clientX;
            joystick.startY = touch.clientY;
            joystick.currX = touch.clientX;
            joystick.currY = touch.clientY;
        } else {
            // Если в правой половине — прыжок
            if (!seal.isJumping) {
                seal.vy = seal.jumpPower;
                seal.isJumping = true;
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!joystick.active) return;
        const touch = e.touches[0];
        joystick.currX = touch.clientX;
        joystick.currY = touch.clientY;

        // Вычисляем движение по горизонтали
        let dx = joystick.currX - joystick.startX;
        let dist = Math.abs(dx);
        let power = Math.min(dist, joystick.maxRadius) / joystick.maxRadius;
        
        seal.vx = (dx > 0 ? 1 : -1) * seal.speed * power;
        seal.facingLeft = seal.vx < 0;
    }, {passive: false});

    canvas.addEventListener('touchend', () => {
        joystick.active = false;
        seal.vx = 0;
    });

    function update() {
        // Физика
        seal.vy += seal.gravity;
        seal.x += seal.vx;
        seal.y += seal.vy;

        // Коллизия с льдиной (сверху)
        if (seal.vy > 0 && 
            seal.y + seal.h > rock.y && 
            seal.y < rock.y + rock.h &&
            seal.x + seal.w > rock.x && 
            seal.x < rock.x + rock.w) {
            seal.y = rock.y - seal.h;
            seal.vy = 0;
            seal.isJumping = false;
        }

        // Ограничения экрана
        if (seal.x < 0) seal.x = 0;
        if (seal.x > canvas.width - seal.w) seal.x = canvas.width - seal.w;
        if (seal.y > canvas.height) { // Упал в воду — респаун
            seal.y = 0;
            seal.vy = 0;
            score = Math.max(0, score - 1);
            scoreElement.innerText = score;
        }

        // Сбор рыбы
        if (seal.x < fish.x + fish.w && seal.x + seal.w > fish.x &&
            seal.y < fish.y + fish.h && seal.y + seal.h > fish.y) {
            score++;
            scoreElement.innerText = score;
            fish.x = Math.random() * (canvas.width - 50);
            fish.y = Math.random() * (canvas.height / 2);
        }
    }

    function draw() {
        // Фон моря
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#1cb5e0');
        grad.addColorStop(1, '#000046');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Льдина
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.fillRect(rock.x, rock.y, rock.w, rock.h);

        // Рыба (убираем белый фон через multiply)
        ctx.save();
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(fishImg, fish.x, fish.y, fish.w, fish.h);
        ctx.restore();

        // Тюлень
        ctx.save();
        ctx.globalCompositeOperation = 'multiply'; // Хак для удаления белого фона
        if (seal.facingLeft) {
            ctx.translate(seal.x + seal.w, seal.y);
            ctx.scale(-1, 1);
            ctx.drawImage(sealImg, 0, 0, seal.w, seal.h);
        } else {
            ctx.drawImage(sealImg, seal.x, seal.y, seal.w, seal.h);
        }
        ctx.restore();

        // Рисование джойстика
        if (joystick.active) {
            ctx.beginPath();
            ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.beginPath();
            let dx = joystick.currX - joystick.startX;
            let dy = joystick.currY - joystick.startY;
            let angle = Math.atan2(dy, dx);
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), joystick.maxRadius);
            let jx = joystick.startX + Math.cos(angle) * dist;
            let jy = joystick.startY + Math.sin(angle) * dist;
            
            ctx.arc(jx, jy, 25, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.fill();
        }

        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
