<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тюлень: Супер Версия</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        .ui {
            position: absolute; top: 15px; left: 15px;
            color: white; font-size: 18px; font-weight: bold;
            text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10;
        }
        .best-score { color: #ffcc00; font-size: 22px; }

        .toggle-btn {
            position: absolute; top: 15px; right: 15px;
            padding: 10px 15px; background: rgba(0, 0, 0, 0.5);
            color: white; border: 2px solid #4facfe; border-radius: 8px;
            cursor: pointer; z-index: 30; font-weight: bold;
        }

        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3);
            display: none; z-index: 15;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px;
            background: rgba(79, 172, 254, 0.6);
            border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        #gameOver {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center;
            background: rgba(0, 20, 40, 0.95); padding: 30px;
            border: 3px solid #4facfe; border-radius: 20px; display: none; z-index: 40;
        }
        .main-btn {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #4facfe; color: white; border: none; border-radius: 10px;
        }
        .damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.3); display: none; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="flash" class="damage-flash"></div>
    <div class="ui">
        <div class="best-score">Рекорд: <span id="best">0</span></div>
        <div>Рыбок: <span id="score">0</span></div>
        <div>Время: <span id="timer">60</span></div>
    </div>

    <button class="toggle-btn" onclick="toggleControl()">Управление: Кнопки</button>

    <div id="joystick-container"><div id="joystick-knob"></div></div>

    <div id="gameOver">
        <h1 id="msg">Игра окончена!</h1>
        <p id="finalScore"></p>
        <button class="main-btn" onclick="resetGame()">Играть снова</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Загрузка твоих моделей
        const sealImg = new Image(); sealImg.src = 'seal.jfif';
        const fishImg = new Image(); fishImg.src = 'fish.jpg';

        let score = 0;
        let bestScore = localStorage.getItem('sealBest') || 0;
        let timeLeft = 60;
        let gameActive = true;
        let controlType = 'keyboard'; 
        let bubbles = [];
        let timerInterval;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        document.getElementById('best').innerText = bestScore;

        const seal = { 
            x: 100, y: 300, w: 90, h: 70, 
            vx: 0, vy: 0, speed: 0.8, friction: 0.93, 
            facingLeft: false, angle: 0 
        };

        const fish = { 
            x: -100, y: 0, w: 60, h: 40, 
            speed: 4, gold: false,
            offset: 0, frequency: 0.005, amplitude: 3 
        };

        const rock = { 
            x: -200, y: 0, w: 110, h: 90, 
            speed: 3.5, angle: 0, rotationSpeed: 0.05 
        };

        // Инициализация пузырьков на фоне
        function initBubbles() {
            bubbles = [];
            for(let i=0; i<35; i++) bubbles.push({ 
                x: Math.random()*canvas.width, 
                y: Math.random()*canvas.height, 
                s: Math.random()*2+1, 
                v: Math.random()*0.5+0.3 
            });
        }

        // --- УПРАВЛЕНИЕ ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let touchX = 0, touchY = 0, isDragging = false;
        const joystick = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');

        function toggleControl() {
            if (controlType === 'keyboard') {
                controlType = 'joystick';
                document.querySelector('.toggle-btn').innerText = "Управление: Джойстик";
                joystick.style.display = 'block';
            } else {
                controlType = 'keyboard';
                document.querySelector('.toggle-btn').innerText = "Управление: Кнопки";
                joystick.style.display = 'none';
                touchX = 0; touchY = 0;
            }
        }

        const handleMove = (e) => {
            if (!isDragging) return;
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 45) { dx *= 45 / dist; dy *= 45 / dist; }
            knob.style.transform = `translate(${dx}px, ${dy}px)`;
            touchX = dx / 45; touchY = dy / 45;
        };

        joystick.addEventListener('mousedown', () => isDragging = true);
        joystick.addEventListener('touchstart', () => isDragging = true);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('mouseup', () => { isDragging = false; knob.style.transform = `translate(0,0)`; touchX = 0; touchY = 0; });
        window.addEventListener('touchend', () => { isDragging = false; knob.style.transform = `translate(0,0)`; touchX = 0; touchY = 0; });

        // --- ЛОГИКА ИГРЫ ---
        function spawnFish() { 
            fish.x = canvas.width + 100; 
            fish.y = 100 + Math.random()*(canvas.height-200); 
            fish.gold = Math.random() < 0.2; 
            fish.speed = fish.gold ? 6 : 3.5 + Math.random() * 2;
            fish.amplitude = 2 + Math.random() * 4;
            fish.offset = Math.random() * 1000;
        }

        function spawnRock() { 
            rock.x = canvas.width + 500; 
            rock.y = Math.random()*(canvas.height-100); 
            rock.rotationSpeed = (Math.random() - 0.5) * 0.15; // Случайное вращение
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => { 
                if(gameActive) { 
                    timeLeft--; 
                    document.getElementById('timer').innerText = timeLeft; 
                    if(timeLeft <= 0) endGame(); 
                } 
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('sealBest', bestScore);
                document.getElementById('best').innerText = bestScore;
            }
            document.getElementById('finalScore').innerText = "Вы собрали: " + score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function resetGame() {
            score = 0; timeLeft = 60; gameActive = true;
            document.getElementById('score').innerText = 0;
            document.getElementById('timer').innerText = 60;
            seal.vx = 0; seal.vy = 0;
            document.getElementById('gameOver').style.display = 'none';
            spawnFish(); spawnRock(); startTimer(); draw();
        }

        function update() {
            if(!gameActive) return;

            // Движение тюленя
            if (controlType === 'keyboard') {
                if(keys['ArrowUp']) seal.vy -= seal.speed;
                if(keys['ArrowDown']) seal.vy += seal.speed;
                if(keys['ArrowLeft']) { seal.vx -= seal.speed; seal.facingLeft = true; }
                if(keys['ArrowRight']) { seal.vx += seal.speed; seal.facingLeft = false; }
            } else {
                seal.vx += touchX * (seal.speed * 1.5);
                seal.vy += touchY * (seal.speed * 1.5);
                if (touchX < -0.1) seal.facingLeft = true;
                if (touchX > 0.1) seal.facingLeft = false;
            }

            seal.vx *= seal.friction; seal.vy *= seal.friction;
            seal.x += seal.vx; seal.y += seal.vy;
            seal.angle = seal.vy * 0.05; // Наклон при плавании

            // Границы экрана
            if(seal.x < 0) seal.x = 0;
            if(seal.x > canvas.width - seal.w) seal.x = canvas.width - seal.w;
            if(seal.y < 0) seal.y = 0;
            if(seal.y > canvas.height - seal.h) seal.y = canvas.height - seal.h;

            // Движение объектов
            fish.x -= fish.speed;
            fish.y += Math.sin((Date.now() + fish.offset) * fish.frequency) * fish.amplitude; // Траектория рыбки
            if(fish.x < -100) spawnFish();

            rock.x -= rock.speed;
            rock.angle += rock.rotationSpeed; // Вращение льдины
            if(rock.x < -150) spawnRock();

            // Коллизия с рыбкой
            let dxF = (seal.x + seal.w/2) - (fish.x + fish.w/2);
            let dyF = (seal.y + seal.h/2) - (fish.y + fish.h/2);
            if(Math.sqrt(dxF*dxF + dyF*dyF) < 55) {
                if(fish.gold) {
                    timeLeft += 10;
                    document.getElementById('timer').style.color = "#00ff00";
                    setTimeout(()=>document.getElementById('timer').style.color="white", 500);
                } else {
                    score++;
                    document.getElementById('score').innerText = score;
                }
                spawnFish();
            }

            // Коллизия со льдиной
            if (seal.x < rock.x + rock.w - 20 && seal.x + seal.w > rock.x + 20 &&
                seal.y < rock.y + rock.h - 20 && seal.y + seal.h > rock.y + 20) {
                timeLeft -= 5;
                document.getElementById('flash').style.display = 'block';
                setTimeout(() => document.getElementById('flash').style.display = 'none', 100);
                spawnRock();
            }
        }

        function draw() {
            if(!gameActive) return;

            // Фон (Градиент воды)
            let g = ctx.createLinearGradient(0,0,0,canvas.height);
            g.addColorStop(0, '#1cb5e0'); g.addColorStop(1, '#000046');
            ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height);

            // Пузырьки
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            bubbles.forEach(b => { 
                ctx.beginPath(); ctx.arc(b.x, b.y, b.s, 0, 7); ctx.fill(); 
                b.y -= b.v; if(b.y < -10) b.y = canvas.height+10; 
            });

            // ВРАЩАЮЩАЯСЯ ЛЬДИНА (Код)
            ctx.save();
            ctx.translate(rock.x + rock.w/2, rock.y + rock.h/2);
            ctx.rotate(rock.angle);
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.beginPath();
            ctx.moveTo(-rock.w/2, -rock.h/2 + 20);
            ctx.lineTo(rock.w/2, -rock.h/2);
            ctx.lineTo(rock.w/2 - 10, rock.h/2);
            ctx.lineTo(-rock.w/2 + 10, rock.h/2 - 10);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,1)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();

            // ТЮЛЕНЬ (Твоя модель)
            ctx.save();
            ctx.translate(seal.x + seal.w/2, seal.y + seal.h/2);
            if(seal.facingLeft) ctx.scale(-1, 1);
            ctx.rotate(seal.facingLeft ? -seal.angle : seal.angle);
            ctx.drawImage(sealImg, -seal.w/2, -seal.h/2, seal.w, seal.h);
            ctx.restore();

            // РЫБКА (Твоя модель + виляние)
            ctx.save();
            let wiggle = Math.sin(Date.now() / 120) * 6;
            if(fish.gold) ctx.filter = "sepia(1) saturate(15) brightness(1.2)";
            ctx.drawImage(fishImg, fish.x, fish.y + wiggle, fish.w, fish.h);
            ctx.restore();

            update();
            requestAnimationFrame(draw);
        }

        initBubbles();
        spawnFish();
        spawnRock();
        startTimer();
        
        // Старт после загрузки картинок
        sealImg.onload = fishImg.onload = () => draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initBubbles();
        });
    </script>
</body>
</html>
