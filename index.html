<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seal Game - New Joystick</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1cb5e0; font-family: 'Arial', sans-serif; }
        canvas { display: block; touch-action: none; }
        #controls {
            position: absolute; top: 10px; right: 10px;
            display: flex; gap: 10px; z-index: 10;
        }
        button {
            padding: 10px; font-size: 16px; border-radius: 8px;
            border: none; background: white; cursor: pointer;
            box-shadow: 0 4px 0 #ccc;
        }
        button:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

    <div id="controls">
        <button onclick="toggleMode()">🕹️ Режим: <span id="modeText">Кнопки</span></button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Ресурсы
    const sealImg = new Image(); sealImg.src = 'seal.jfif';
    const fishImg = new Image(); fishImg.src = 'fish.jpg';

    let isJoystickMode = false;
    let score = 0;

    const seal = {
        x: 50, y: 100, w: 70, h: 70,
        vx: 0, vy: 0, speed: 5,
        gravity: 0.4, isJumping: false, facingLeft: false
    };

    const fish = { x: 200, y: 150, w: 40, h: 30 };
    const rock = { x: 100, y: canvas.height - 150, w: 180, h: 40 };

    // Состояние джойстика
    const joy = { active: false, x: 0, y: 0, currX: 0, currY: 0, radius: 50 };

    function toggleMode() {
        isJoystickMode = !isJoystickMode;
        document.getElementById('modeText').innerText = isJoystickMode ? "Джойстик" : "Кнопки";
    }

    // УПРАВЛЕНИЕ
    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") { seal.vx = -seal.speed; seal.facingLeft = true; }
        if (e.key === "ArrowRight") { seal.vx = seal.speed; seal.facingLeft = false; }
        if (e.key === "ArrowUp" && !seal.isJumping) { seal.vy = -10; seal.isJumping = true; }
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === "ArrowLeft" || e.key === "ArrowRight") seal.vx = 0;
    });

    // TOUCH EVENTS
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const tx = touch.clientX;
        
        if (isJoystickMode) {
            if (tx < canvas.width / 2) {
                joy.active = true;
                joy.x = tx; joy.y = touch.clientY;
                joy.currX = tx; joy.currY = touch.clientY;
            } else if (!seal.isJumping) {
                // Прыжок при тапе справа
                seal.vy = -10; seal.isJumping = true;
            }
        } else {
            // Обычный режим (лево/право/прыжок)
            if (tx < canvas.width / 3) { seal.vx = -seal.speed; seal.facingLeft = true; }
            else if (tx > canvas.width * 0.66) { seal.vx = seal.speed; seal.facingLeft = false; }
            else if (!seal.isJumping) { seal.vy = -10; seal.isJumping = true; }
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (isJoystickMode && joy.active) {
            const touch = e.touches[0];
            joy.currX = touch.clientX;
            joy.currY = touch.clientY;
            
            let dx = joy.currX - joy.x;
            let dist = Math.abs(dx);
            let power = Math.min(dist, joy.radius) / joy.radius;
            seal.vx = (dx > 0 ? 1 : -1) * seal.speed * power;
            seal.facingLeft = seal.vx < 0;
        }
    });

    canvas.addEventListener('touchend', () => {
        joy.active = false;
        seal.vx = 0;
    });

    function update() {
        seal.vy += seal.gravity;
        seal.x += seal.vx;
        seal.y += seal.vy;

        // Пол и льдина
        if (seal.y + seal.h > rock.y && seal.y < rock.y + rock.h &&
            seal.x + seal.w > rock.x && seal.x < rock.x + rock.w && seal.vy > 0) {
            seal.y = rock.y - seal.h;
            seal.vy = 0;
            seal.isJumping = false;
        }

        if (seal.x < 0) seal.x = 0;
        if (seal.x > canvas.width - seal.w) seal.x = canvas.width - seal.w;
        if (seal.y > canvas.height) { seal.y = 0; seal.vy = 0; }

        // Сбор рыбы
        if (Math.abs(seal.x - fish.x) < 50 && Math.abs(seal.y - fish.y) < 50) {
            score++;
            fish.x = Math.random() * (canvas.width - 50);
            fish.y = Math.random() * (canvas.height - 200);
        }
    }

    function draw() {
        // Отрисовка фона
        let g = ctx.createLinearGradient(0,0,0,canvas.height);
        g.addColorStop(0, '#1cb5e0'); g.addColorStop(1, '#000046');
        ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height);

        // Льдина
        ctx.fillStyle = "white";
        ctx.fillRect(rock.x, rock.y, rock.w, rock.h);

        // Рыба и Тюлень (с удалением фона)
        ctx.save();
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(fishImg, fish.x, fish.y, fish.w, fish.h);
        
        if (seal.facingLeft) {
            ctx.translate(seal.x + seal.w, seal.y);
            ctx.scale(-1, 1);
            ctx.drawImage(sealImg, 0, 0, seal.w, seal.h);
        } else {
            ctx.drawImage(sealImg, seal.x, seal.y, seal.w, seal.h);
        }
        ctx.restore();

        // Счет
        ctx.fillStyle = "white";
        ctx.font = "bold 24px Arial";
        ctx.fillText("Рыбы: " + score, 20, 40);

        // Визуал джойстика
        if (isJoystickMode && joy.active) {
            ctx.beginPath();
            ctx.arc(joy.x, joy.y, joy.radius, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.stroke();
            
            ctx.beginPath();
            let dx = joy.currX - joy.x;
            let dist = Math.min(Math.abs(dx), joy.radius);
            ctx.arc(joy.x + (dx > 0 ? dist : -dist), joy.y, 20, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.fill();
        }

        update();
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
