<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seal Game Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1cb5e0; }
        canvas { display: block; touch-action: none; }
        #score {
            position: absolute; top: 10px; left: 10px;
            color: white; font-size: 30px; font-family: Arial;
            text-shadow: 2px 2px 4px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDiv = document.getElementById('score');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Картинки
    const sealImg = new Image(); sealImg.src = 'seal.jfif';
    const fishImg = new Image(); fishImg.src = 'fish.jpg';

    let score = 0;
    const seal = {
        x: 50, y: 50, w: 70, h: 70,
        vx: 0, vy: 0, speed: 7,
        gravity: 0.5, jump: -12, isJumping: false, facingLeft: false
    };

    const fish = { x: 200, y: 100, w: 45, h: 35 };
    const rock = { x: 100, y: canvas.height * 0.7, w: 200, h: 40 };

    // УПРАВЛЕНИЕ ТАПАМИ (ПРОСТОЕ)
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const tx = t.clientX;
        const ty = t.clientY;

        if (ty < canvas.height * 0.4) { 
            // Верхняя часть экрана - ПРЫЖОК
            if (!seal.isJumping) { seal.vy = seal.jump; seal.isJumping = true; }
        } else {
            // Нижняя часть - ДВИЖЕНИЕ
            if (tx < canvas.width / 2) { seal.vx = -seal.speed; seal.facingLeft = true; }
            else { seal.vx = seal.speed; seal.facingLeft = false; }
        }
    }, {passive: false});

    canvas.addEventListener('touchend', () => {
        seal.vx = 0; // Остановиться, когда отпустил
    });

    function update() {
        seal.vy += seal.gravity;
        seal.x += seal.vx;
        seal.y += seal.vy;

        // Платформа
        if (seal.vy > 0 && 
            seal.y + seal.h > rock.y && seal.y < rock.y + rock.h &&
            seal.x + seal.w > rock.x && seal.x < rock.x + rock.w) {
            seal.y = rock.y - seal.h;
            seal.vy = 0;
            seal.isJumping = false;
        }

        if (seal.x < 0) seal.x = 0;
        if (seal.x > canvas.width - seal.w) seal.x = canvas.width - seal.w;
        if (seal.y > canvas.height) { seal.y = 0; seal.vy = 0; }

        // Сбор рыбы
        if (Math.abs(seal.x - fish.x) < 50 && Math.abs(seal.y - fish.y) < 50) {
            score++;
            scoreDiv.innerText = score;
            fish.x = Math.random() * (canvas.width - 50);
            fish.y = Math.random() * (canvas.height * 0.5);
        }
    }

    function draw() {
        ctx.fillStyle = '#1cb5e0'; // Просто заливка фона
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        ctx.fillRect(rock.x, rock.y, rock.w, rock.h);

        ctx.drawImage(fishImg, fish.x, fish.y, fish.w, fish.h);
        
        ctx.save();
        if (seal.facingLeft) {
            ctx.translate(seal.x + seal.w, seal.y);
            ctx.scale(-1, 1);
            ctx.drawImage(sealImg, 0, 0, seal.w, seal.h);
        } else {
            ctx.drawImage(sealImg, seal.x, seal.y, seal.w, seal.h);
        }
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
